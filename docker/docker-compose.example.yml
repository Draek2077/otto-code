# Minimal Otto daemon + web UI deployment.
#
# Open http://localhost:6868 after `docker compose up -d`.
# For any network-reachable deployment, change OTTO_PASSWORD first.
services:
  otto:
    image: ghcr.io/draek2077/otto:latest
    container_name: otto
    restart: unless-stopped
    ports:
      - "6868:6868"
    environment:
      OTTO_PASSWORD: "change-me"
      # Add DNS names you use to reach this container. IPs and localhost are
      # already allowed by default.
      # OTTO_HOSTNAMES: "otto.example.com,.lan"
    volumes:
      # Persistent daemon state and agent credentials/config.
      - ./otto-home:/home/otto
      # Code visible to Otto and the agents it launches.
      - ./workspace:/workspace
