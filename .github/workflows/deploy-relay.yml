name: Deploy Relay

on:
  # Manual-only while relay.otto-code.me bridges traffic to the Fly deployment.
  # A release or main push must not redeploy the temporary Cloudflare bridge.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=@otto-code/relay --include-workspace-root

      - name: Typecheck
        run: npm run typecheck --workspace=@otto-code/relay

      - name: Deploy worker
        # OTTO_RELAY_UPSTREAM is set here, not in wrangler.toml [vars], so the
        # Fly cutover bridge only applies to the deployed production worker and
        # never leaks into local/e2e `wrangler dev` runs (which would then fail
        # to reach the external upstream in CI). See wrangler.toml for context.
        run: cd packages/relay && npx wrangler deploy --var OTTO_RELAY_UPSTREAM:https://otto-relay-next.fly.dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
