name: Deploy Relay

on:
  # Manual-only while relay.otto-code.me bridges traffic to the Fly deployment.
  # A release or main push must not redeploy the temporary Cloudflare bridge.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=@otto-code/relay --include-workspace-root

      - name: Typecheck
        run: npm run typecheck --workspace=@otto-code/relay

      - name: Deploy worker
        run: cd packages/relay && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
