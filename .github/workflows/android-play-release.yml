name: Android Play Release

# Builds an Android App Bundle (AAB) via EAS and submits it to the Google Play
# **internal testing** track on a release tag. This is the automated replacement
# for hand-downloading the AAB and uploading it in the Play Console.
#
# Kept separate from android-apk-release.yml (which builds a sideloadable APK and
# attaches it to the GitHub Release) so the two can be retried independently: a
# failed Play submission does not require rebuilding the sideload APK, and a
# retry tag `android-play-vX.Y.Z` rebuilds/submits only this path.
#
# Requires two repo secrets:
#   - EXPO_TOKEN                     (already set; authenticates the EAS build)
#   - GOOGLE_SERVICE_ACCOUNT_KEY     (full JSON of a Google Play service-account
#                                     key with the "Release to testing tracks"
#                                     permission for me.ottocode.mobile)

on:
  push:
    tags:
      - "v*"
      - "android-play-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and submit (e.g. v0.5.1)"
        required: true
        type: string

concurrency:
  group: android-play-release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  SOURCE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  submit-play-internal:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        shell: bash
        run: node scripts/emit-release-env.mjs --source-tag "$SOURCE_TAG" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Play service account key
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_KEY:-}" ]; then
            echo "GOOGLE_SERVICE_ACCOUNT_KEY secret is not set — cannot submit to Play." >&2
            exit 1
          fi
          # eas.json's submit.internal profile reads ./google-service-account.json
          # (relative to packages/app). Written from a secret so it never lands in git.
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_KEY" > packages/app/google-service-account.json

      - name: Build Android App Bundle on EAS
        id: eas_build
        shell: bash
        run: |
          set -euo pipefail
          cd packages/app

          build_json="$(npx eas build --platform android --profile production --non-interactive --wait --json)"
          echo "$build_json" > "$RUNNER_TEMP/eas-build.json"

          build_id="$(jq -r 'if type == "array" then .[0].id // empty else .id // empty end' "$RUNNER_TEMP/eas-build.json")"
          if [ -z "$build_id" ]; then
            echo "Failed to determine EAS build ID." >&2
            cat "$RUNNER_TEMP/eas-build.json"
            exit 1
          fi

          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"

      - name: Submit AAB to Play internal track
        shell: bash
        run: |
          set -euo pipefail
          cd packages/app
          npx eas submit --platform android --profile internal --id '${{ steps.eas_build.outputs.build_id }}' --non-interactive

      - name: Clean up service account key
        if: always()
        shell: bash
        run: rm -f packages/app/google-service-account.json
