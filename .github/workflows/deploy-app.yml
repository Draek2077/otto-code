name: Deploy App

on:
  push:
    tags:
      - "v*"
      - "!v*-beta.*"
      - "app-v*"
      - "!app-v*-beta.*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@boudra"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app dependencies
        run: npm run build:app-deps

      - name: Typecheck
        run: npm run typecheck --workspace=@otto-code/app

      # wrangler pages deploy doesn't auto-create the project; create it on first
      # run. The create command fails when the project already exists, so tolerate
      # that — a real auth/permission problem still surfaces in the deploy step.
      - name: Ensure Cloudflare Pages project exists
        run: npx wrangler pages project create otto-app --production-branch main || echo "Project already exists (or creation failed; deploy will surface real errors)"
        working-directory: packages/app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 3910072adb29ec7ee1bdcc37d532765d

      - name: Build and deploy to Cloudflare Pages
        run: npm run deploy:web --workspace=@otto-code/app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 3910072adb29ec7ee1bdcc37d532765d
