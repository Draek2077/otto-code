<!doctype html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#18181b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Otto" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* Keep the app shell fixed to the viewport. */
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
      }
      /* These styles smooth text rendering in the app shell. */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Prevent white flash before React mounts */
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background-color: #000000;
        }
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        width: 100%;
        height: 100%;
        flex: 1;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }
    </style>
    <style>
      /* Scoped no-drag backstop for Electron titlebar strips.
         Chromium computes -webkit-app-region rects from UNCLIPPED bounding
         boxes of every annotated element in the document — overflow clipping
         and z-order are ignored (electron/electron#7605). A global no-drag
         rule therefore lets interactive chat content scrolled BEHIND the
         titlebar punch invisible holes in the drag strip. Unannotated
         elements never subtract from a drag region, so we only stamp no-drag
         on interactive elements that live inside a titlebar strip: either a
         container that itself is a drag region ([data-app-region-drag] on the
         workspace header label) or a container that holds a drag overlay
         (:has(> [data-app-region-drag]) — TitlebarDragRegion's parent).
         Everything else in the app stays unannotated. */
      :is([data-app-region-drag], :has(> [data-app-region-drag]))
        :is(
          button,
          a,
          input,
          textarea,
          select,
          [role="button"],
          [role="link"],
          [role="textbox"],
          [role="combobox"],
          [role="tab"],
          [role="switch"],
          [role="checkbox"],
          [role="slider"],
          [role="menuitem"],
          [tabindex],
          [contenteditable="true"]
        ) {
        -webkit-app-region: no-drag !important;
      }

      /* Portaled overlays are the second place no-drag is required. Popup
         menus, dialogs, and sheets render in react-native-web Modal layers
         appended directly to <body> (plus the #overlay-root portal host) —
         outside #root and outside any drag-region container, so the scoped
         rule above never reaches them. Drag regions hit-test ahead of DOM
         z-order, so without no-drag an open menu is click-dead wherever it
         overlaps a titlebar strip or a pane tab-bar gutter (context menus
         open at the cursor — inside that gutter). Unlike app content, these
         layers exist only while an overlay is open, so they cannot punch
         persistent holes in the drag strip. */
      body
        > :not(#root)
        :is(
          button,
          a,
          input,
          textarea,
          select,
          [role="button"],
          [role="link"],
          [role="textbox"],
          [role="combobox"],
          [role="tab"],
          [role="switch"],
          [role="checkbox"],
          [role="slider"],
          [role="menuitem"],
          [tabindex],
          [contenteditable="true"]
        ) {
        -webkit-app-region: no-drag !important;
      }

      /* Suppress the browser's default focus outline — it appears on mouse
         clicks and looks out of place against our themed surfaces. Keep a
         themed ring for keyboard users via :focus-visible. This is the
         pre-mount shell ring; once React themes the app the live accent takes
         over. Accent is theme-chosen now, so mirror the System pair's two
         defaults: Daylight's deep yellow on light, Twilight's pale blue on
         dark. */
      *:focus {
        outline: none;
      }
      *:focus-visible {
        outline: 2px solid #b98d00;
        outline-offset: 2px;
      }
      @media (prefers-color-scheme: dark) {
        *:focus-visible {
          outline-color: #7ea6d9;
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
