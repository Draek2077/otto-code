<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1024px;
        height: 500px;
        overflow: hidden;
      }
      body {
        position: relative;
        background: #0b0b10;
        font-family:
          "Segoe UI",
          -apple-system,
          system-ui,
          sans-serif;
        color: #f4f4f6;
        display: flex;
        align-items: center;
      }
      .glow {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(720px 420px at 82% 18%, rgba(99, 91, 255, 0.22), transparent 65%),
          radial-gradient(560px 380px at 12% 92%, rgba(45, 212, 191, 0.1), transparent 60%);
      }
      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(640px 400px at 70% 30%, black, transparent 75%);
        -webkit-mask-image: radial-gradient(640px 400px at 70% 30%, black, transparent 75%);
      }
      .content {
        position: relative;
        padding: 0 72px;
        max-width: 900px;
        transform: translate(30px, -16px);
      }
      .brand {
        margin-bottom: 16px;
      }
      /* The glyph's viewBox carries big empty margins; the negative margins
         trim that whitespace symmetrically so the visible logo sits tight to
         the headline and the whole content block centers true in the tile. */
      .brand svg {
        width: 240px;
        height: 240px;
        display: block;
        margin-left: -26px;
        margin-top: -62px;
        margin-bottom: -50px;
      }
      /* The app's BlobLoader working indicator, frozen mid-orbit: two glow
         layers with the exact GlowLayer geometry, rotated so the cyan and
         magenta lights sit on opposing sides of the ring. */
      .blob {
        position: absolute;
        right: 66px;
        top: calc(50% - 16px);
        transform: translateY(-50%);
        width: 330px;
        height: 330px;
      }
      .blob .layer {
        position: absolute;
        inset: 0;
      }
      .blob .layer.a {
        transform: rotate(35deg);
      }
      .blob .layer.b {
        transform: rotate(205deg);
      }
      h1 {
        font-size: 34px;
        line-height: 1.25;
        font-weight: 550;
        letter-spacing: -0.4px;
        margin-bottom: 18px;
        white-space: nowrap;
      }
      h1 .accent {
        color: #a5b4fc;
      }
      .providers {
        font-size: 20px;
        color: rgba(244, 244, 246, 0.62);
        letter-spacing: 0.2px;
      }
      .providers span {
        color: rgba(244, 244, 246, 0.34);
        padding: 0 10px;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="grid"></div>
    <div class="blob">
      <div class="layer a">
        <svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="glow-a" cx="76%" cy="20%" r="75%">
              <stop offset="0%" stop-color="#4ec4ff" stop-opacity="0.95" />
              <stop offset="45%" stop-color="#4ec4ff" stop-opacity="0.35" />
              <stop offset="100%" stop-color="#4ec4ff" stop-opacity="0" />
            </radialGradient>
          </defs>
          <circle
            cx="50"
            cy="50"
            r="40"
            stroke="url(#glow-a)"
            stroke-width="26"
            fill="none"
            opacity="0.16"
          />
          <circle
            cx="50"
            cy="50"
            r="40"
            stroke="url(#glow-a)"
            stroke-width="16"
            fill="none"
            opacity="0.3"
          />
          <circle
            cx="50"
            cy="50"
            r="40"
            stroke="url(#glow-a)"
            stroke-width="9"
            fill="none"
            opacity="0.95"
          />
          <circle cx="50" cy="50" r="33" fill="url(#glow-a)" opacity="0.14" />
        </svg>
      </div>
      <div class="layer b">
        <svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="glow-b" cx="76%" cy="20%" r="75%">
              <stop offset="0%" stop-color="#e14fe8" stop-opacity="0.95" />
              <stop offset="45%" stop-color="#e14fe8" stop-opacity="0.35" />
              <stop offset="100%" stop-color="#e14fe8" stop-opacity="0" />
            </radialGradient>
          </defs>
          <circle
            cx="50"
            cy="50"
            r="40"
            stroke="url(#glow-b)"
            stroke-width="26"
            fill="none"
            opacity="0.16"
          />
          <circle
            cx="50"
            cy="50"
            r="40"
            stroke="url(#glow-b)"
            stroke-width="16"
            fill="none"
            opacity="0.3"
          />
          <circle
            cx="50"
            cy="50"
            r="40"
            stroke="url(#glow-b)"
            stroke-width="9"
            fill="none"
            opacity="0.95"
          />
          <circle cx="50" cy="50" r="33" fill="url(#glow-b)" opacity="0.14" />
        </svg>
      </div>
    </div>
    <div class="content">
      <div class="brand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
          <g stroke="white" stroke-width="28">
            <circle cx="114.72778" cy="280" r="70" />
            <circle cx="397.27271" cy="280" r="70" />
            <line x1="155.08434" y1="162" x2="251.08434" y2="162" />
            <line x1="216" y1="162" x2="216" y2="364" />
            <line x1="260.91559" y1="162" x2="356.91559" y2="162" />
            <line x1="296" y1="162" x2="296" y2="364" />
            <circle cx="114.72778" cy="280" r="22" fill="white" stroke="none" />
            <circle cx="397.27271" cy="280" r="22" fill="white" stroke="none" />
          </g>
        </svg>
      </div>
      <h1>
        A fully featured agentic coding assistant<br />
        for <span class="accent">every model, cloud or local</span>
      </h1>
      <div class="providers">
        Claude Code <span>·</span> Codex <span>·</span> OpenCode <span>·</span> LM Studio
      </div>
    </div>
  </body>
</html>
