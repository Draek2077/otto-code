npmRebuild: false
appId: ai.ottocode.desktop
productName: Otto
executableName: Otto
afterPack: ./scripts/after-pack.js
afterSign: ./scripts/after-sign.js
directories:
  output: release
files:
  - dist/**/*
  - "!**/*.map"
  - "!node_modules/@otto-code/*/src/**"
  - "!node_modules/@otto-code/**/*.test.*"
  - "!node_modules/@otto-code/**/*.spec.*"
  - "!node_modules/@otto-code/server/dist/server/web-ui/**"
asarUnpack:
  - dist/daemon/node-entrypoint-runner.js
  - node_modules/@otto-code/server/dist/server/terminal/shell-integration/**/*
extraResources:
  - from: ../app/dist
    to: app-dist
  - from: ../../skills
    to: skills
  - from: assets/tray-icon.png
    to: tray-icon.png
  - from: assets/tray-icon-attention.png
    to: tray-icon-attention.png
  - from: assets/tray-icon-mac.png
    to: tray-icon-mac.png
  - from: assets/tray-icon-mac@2x.png
    to: tray-icon-mac@2x.png
  - from: assets/tray-icon-mac-attention.png
    to: tray-icon-mac-attention.png
  - from: assets/tray-icon-mac-attention@2x.png
    to: tray-icon-mac-attention@2x.png
publish:
  provider: github
  owner: Draek2077
  repo: otto-code
mac:
  artifactName: "Otto-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: true
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extraResources:
    - from: bin/otto
      to: bin/otto
  target:
    - dmg
    - zip
linux:
  category: Development
  icon: assets
  artifactName: "Otto-${version}-${arch}.${ext}"
  maintainer: "Draekz <https://github.com/Draek2077>"
  vendor: "Otto"
  extraResources:
    - from: bin/otto
      to: bin/otto
  target:
    - AppImage
    - deb
    - rpm
    - tar.gz
deb:
  afterInstall: build/linux/after-install.sh
  afterRemove: build/linux/after-remove.sh
rpm:
  afterInstall: build/linux/after-install.sh
  afterRemove: build/linux/after-remove.sh
appImage:
  # Keep the AppImage filename stable across versions (no ${version}) so
  # electron-updater overwrites the file in place instead of renaming it to a new
  # versioned path. A rename orphans the old binary, breaks desktop shortcuts, and
  # dangles the ~/.local/bin/otto CLI symlink, which points at $APPIMAGE. The
  # version stays discoverable via the release tag and the in-app version.
  artifactName: "Otto-${arch}.${ext}"
win:
  artifactName: "Otto-Setup-${version}-${arch}.${ext}"
  icon: assets/icon.ico
  extraResources:
    - from: bin/otto.cmd
      to: bin/otto.cmd
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
